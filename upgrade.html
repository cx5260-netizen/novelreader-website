<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>升级 - NovelReader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #1a1a1a;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .upgrade-container {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .upgrade-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 30px 24px;
      text-align: center;
    }
    
    .upgrade-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .upgrade-header p {
      opacity: 0.9;
      font-size: 14px;
    }
    
    .upgrade-body {
      padding: 24px;
    }
    
    .status-section {
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }
    
    .status-free {
      background: #fff3e0;
      color: #e65100;
    }
    
    .status-active {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .status-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .status-desc {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .features-section {
      margin-bottom: 20px;
    }
    
    .features-title {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin-bottom: 12px;
    }
    
    .features-list {
      list-style: none;
    }
    
    .features-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    
    .features-list li:last-child {
      border-bottom: none;
    }
    
    .feature-icon {
      font-size: 18px;
    }
    
    .feature-text {
      font-size: 13px;
      color: #333;
    }
    
    .price-section {
      background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    
    .price-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    
    .price-value {
      font-size: 36px;
      font-weight: 700;
      color: #e74c3c;
    }
    
    .price-unit {
      font-size: 14px;
      color: #999;
      font-weight: normal;
    }
    
    .activate-section {
      margin-bottom: 16px;
    }
    
    .activate-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .activate-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    .activate-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .activate-input::placeholder {
      color: #aaa;
    }
    
    .activate-btn {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    
    .activate-btn:hover {
      background: #5a6fd6;
    }
    
    .activate-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .message {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    
    .message-success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }
    
    .message-error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
    
    .buy-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .buy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .footer {
      text-align: center;
      padding: 16px;
      color: #999;
      font-size: 11px;
    }
    
    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .buy-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .buy-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }
    
    .buy-steps {
      font-size: 12px;
      color: #666;
      line-height: 1.8;
    }
    
    .buy-step {
      padding: 2px 0;
    }
    
    .contact-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      color: #fff;
    }
    
    .contact-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .contact-info {
      font-size: 12px;
      line-height: 1.6;
    }
    
    .contact-info strong {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
    }
    
    .contact-info p {
      margin: 4px 0;
      opacity: 0.9;
    }
    
    .qr-section {
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .qr-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      text-align: center;
      margin-bottom: 12px;
    }
    
    .qr-images {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    
    .qr-item {
      text-align: center;
    }
    
    .qr-item img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      border: 1px solid #eee;
      border-radius: 8px;
      background: #fff;
    }
    
    .qr-item span {
      display: block;
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
    
    .buy-btn {
      display: none;
    }
  </style>
</head>
<body>
  <div class="upgrade-container">
    <div class="upgrade-header">
      <h1>🌟 NovelReader 高级版</h1>
      <p>解锁全部功能，享受极致阅读体验</p>
    </div>
    
    <div class="upgrade-body">
      <!-- 状态 -->
      <div class="status-section status-free" id="statusSection">
        <div class="status-icon">⭐</div>
        <div class="status-title" id="statusTitle">免费版用户</div>
        <div class="status-desc" id="statusDesc">已下载 0 / 50 章</div>
      </div>
      
      <!-- 功能列表 -->
      <div class="features-section">
        <div class="features-title">高级版特权</div>
        <ul class="features-list">
          <li><span class="feature-icon">📥</span><span class="feature-text">无限章节批量下载</span></li>
          <li><span class="feature-icon">🎧</span><span class="feature-text">高质量 TTS 语音朗读</span></li>
          <li><span class="feature-icon">🚫</span><span class="feature-text">去广告纯净体验</span></li>
          <li><span class="feature-icon">💬</span><span class="feature-text">优先技术支持</span></li>
        </ul>
      </div>
      
      <!-- 价格（未激活时显示） -->
      <div class="price-section" id="priceSection">
        <div class="price-label">限时优惠价</div>
        <div class="price-value">¥88 <span class="price-unit">/ 永久</span></div>
      </div>
      
      <!-- 购买流程（未激活时显示） -->
      <div class="buy-section" id="buySection">
        <div class="buy-title">购买流程</div>
        <div class="buy-steps">
          <div class="buy-step">1. 扫码付款（微信/支付宝）</div>
          <div class="buy-step">2. 发送付款截图 + 邮箱到下方地址</div>
          <div class="buy-step">3. 收到激活码后激活</div>
        </div>
      </div>
      
      <!-- 联系方式（未激活时显示） -->
      <div class="contact-section" id="contactSection">
        <div class="contact-title">📧 联系购买</div>
        <div class="contact-info">
          <strong>邮箱：cx5260@163.com</strong>
          <p>付款后发送：付款截图 + 你的邮箱</p>
          <p>24小时内回复激活码</p>
        </div>
      </div>
      
      <!-- 收款码展示（未激活时显示） -->
      <div class="qr-section" id="qrSection">
        <div class="qr-title">微信扫码付款 ¥88</div>
        <div class="qr-images">
          <div class="qr-item">
            <img src="icons/qr-wechat.png" alt="微信付款">
            <span>微信支付</span>
          </div>
        </div>
      </div>
      
      <!-- 激活码（未激活时显示） -->
      <div class="activate-section" id="activateSection">
        <div class="activate-title">已有激活码？输入激活</div>
        <input type="text" class="activate-input" id="licenseInput" placeholder="请输入激活码">
        <button class="activate-btn" id="activateBtn">激活高级版</button>
        <div class="message" id="activateMessage"></div>
      </div>
    </div>
    
    <div class="footer">
      如有任何问题，请联系 cx5260@163.com
    </div>
  </div>

  <script src="upgrade.js"></script>
</body>
</html>
